<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank you</title>
  {% if redirect_url %}<meta http-equiv="refresh" content="{{ redirect_timeout }}; url={{ redirect_url }}">{% endif %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main { width: 100%; max-width: 540px; }
    .message {
      font-size: .95rem;
      color: #555;
      line-height: 1.6;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<main>
  <p class="message">{{ thankyou }}</p>
</main>
</body>
</html>
